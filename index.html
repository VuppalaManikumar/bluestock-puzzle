<!DOCTYPE html>
<html>

<head>
<title>Bluestock Puzzle</title>
<link rel="stylesheet" href="brand.css">
</head>

<body>

<div class="navbar">
<h2>Bluestock Puzzle</h2>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Puzzles</a>
<a href="#">Leaderboard</a>
</div>
</div>

<div class="container">

<h1>Daily Puzzle Game</h1>

<div class="card">

<p>Solve today's puzzle and maintain your streak.</p>

<button class="btn-primary" id="startPuzzle">Start Puzzle</button>
<button class="btn-accent" id="submitScore">Submit Score</button>
<button class="btn-secondary" id="hintBtn">Hint</button>

<p id="timer"></p>
<p id="puzzle"></p>
<p id="streak"></p>

</div>

<div class="heatmap-container">
<h2>Puzzle Activity</h2>

<div id="heatmap"></div>

<div class="heatmap-legend">
<span>Less</span>
<div class="legend-box legend-0"></div>
<div class="legend-box legend-1"></div>
<div class="legend-box legend-2"></div>
<div class="legend-box legend-3"></div>
<div class="legend-box legend-4"></div>
<span>More</span>
</div>

</div>

</div>

<script src="puzzleEngine.js"></script>
<script src="storage.js"></script>
<script src="heatmap.js"></script>
<script src="sync.js"></script>
<script src="script.js"></script>

</body>
</html>
